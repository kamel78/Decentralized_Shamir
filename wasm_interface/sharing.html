<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic User Lists</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/all.min.css">
</head>
<body>
    <div class="controls">
        <div class="form-container">
            <label>Nombre d'utilisateurs: <input type="number" id="userCount" min="1" max="10" value="7"></label>
            <label>Threshold: <input type="number" id="threshold" min="0" value="4"></label>
            <button onclick="generate_users_conf()">Générer un Schéma</button>
        </div>
        <div class="button-container">
            <button class="styled-button" id="enc-button" onclick="window.open('./yakhdam.html','_blank')">Chiffrement</button>
            <button class="styled-button" id="rec-button" onclick="window.location='./reconstruction.html'">Reconstruction</button>
        </div>
        <div class="top-right-container">
            <button class="styled-button red-button" id="save-button" onclick="save_conf_ToFile()">Enregistrer</button>
            <button class="styled-button red-button" onclick="load_conf_FromFile()">Charger</button>
            <button class="styled-button red-button" onclick="reset_share_conf()">Réinitialiser</button>
        </div>    
    </div>
    
    <div class="container" id="tableContainer"></div>
    <!-- <script src="./scripts/scripts.js" type="module"></script> -->
    <script type="module">
        import "./scripts/scripts.js";
        import "./scripts/files.js";
        window.users_list = [];
        window.wShamir_list = new Map();
        window.global_threshold =0;
        window.global_count =0;
        window.shares_count =0;
        window.rec_table = null;

        document.getElementById('save-button').disabled = true;
        document.addEventListener("DOMContentLoaded", initializeTablesZIndex);
        
        window.addEventListener('beforeunload', () => {
                                console.log('Saving state...');
                                save_share_conf();
                                });
        document.addEventListener('DOMContentLoaded', loadWasm);
        document.addEventListener('wasmLoaded', () => {
                        document.getElementById('save-button').disabled = true;
                        document.getElementById('rec-button').disabled = true;
                        document.getElementById('enc-button').disabled = true;
                        restore_share_conf();
                        }); 
    </script>
</body>
</html>
