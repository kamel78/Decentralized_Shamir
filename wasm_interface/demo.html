<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic User Lists</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .controls {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgb(230, 175, 9); /* Yellow background */
            padding: 15px;
            border: 1px solid black;
            z-index: 10;
            box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.3); /* Shadow effect */
            border-radius: 8px; /* Smooth corners */
        }

        .form-container {
            display: flex;
            flex-direction: column;
            padding: 2px 15px 1px 2px;;            
            gap: 5px; /* Space between inputs and button */
        }

        .form-container label {
            display: flex;
            flex-direction: column;
            font-weight: bold;
            font-size: 13px; /* Adjust the size as needed */
            margin-bottom: 3px;
        }

        .form-container input {
            margin-top: 5px;
            width: 100%; /* Makes both inputs the same width */
            padding: 5px;
            border: 1px solid black;
            border-radius: 4px;
        }

        .form-container button {
            width: 100%; /* Stretches button */
            margin-top: 10px; /* Space between button and inputs */
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            background-color:#0056b3;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .form-container button:hover {
            background-color: darkblue;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .table-wrapper {
            position: absolute;
            cursor: grab;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3); /* Adds shadow */
            border-radius: 8px; /* Smooth corners for the wrapper */
            padding: 5px;
            display: inline-block;
            border: 1px solid black;
        }
        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            width: 5px;  /* Small width for precision */
            height: 100%;
            cursor: ew-resize;
            background-color: transparent; /* Invisible */
        }
        .resizer:hover {
            background-color: rgba(0, 0, 0, 0.1); /* Slight highlight when hovered */
        }
        .table-wrapper {
            position: absolute;
            cursor: grab;
            box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.3); /* Adds shadow */
            border-radius: 10px; /* Smooth corners for the wrapper */
            padding: 5px;
            overflow: auto;
            display: inline-block;
            padding: 0; /* Removes any inner spacing */
            margin: 0; /* Ensures no extra margin */
            max-width: 100%;
        }

        table {
            border-collapse: collapse;
            border-spacing: 0;
            width: 300px;
            table-layout: fixed;
            border-collapse: collapse;
            text-align: center;
            background: white;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-top: 1px solid black;  /* Keep top border */
            border-bottom: 1px solid black; /* Keep bottom border */
            border-left: none;  /* Remove left border */
            border-right: none; /* Remove right border */
            overflow: hidden;
        }
        th, td {
            padding: 4px;
            border-top: 1px solid rgba(0, 0, 0, 0.3); /* Keep top border */
            border-bottom: 1px solid rgba(0, 0, 0, 0.3); /* Keep bottom border */
            border-left: none; /* Remove left border */
            border-right: none; /* Remove right border */
            white-space: nowrap; /* Prevent text from wrapping */
            overflow: hidden;
            text-overflow: ellipsis; /* Adds "..." if text overflows */
            max-width: 200px; /* Adjust width as needed */
        }
        th {
            background-color: #f4f4f4;
            border-top-left-radius: 0px; /* Ensures rounded corners on the top */
            border-top-right-radius: 0px;
        }
        th {
             background-color: #b0b0b0; /* Slightly darker grey for the header */
            }

        td {
            background-color: #e2dddd; /* Ensures table cells match */
            font-size: 14px;  /* Adjust text size */
            font-family: "Arial", sans-serif;  /* Change font */
            font-weight: normal;  /* Adjust weight if needed */
            text-align: left;  /* Keep text centered */
            padding: 4px;  /* Maintain spacing */
        }
        tr:last-child td:first-child {
            border-bottom-left-radius: 10px; /* Bottom left corner */
        }

        tr:last-child td:last-child {
            border-bottom-right-radius: 10px; /* Bottom right corner */
        }
        table {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }        
        .fixed-row {
            position: sticky;
            bottom: 0;
            background-color: rgb(173, 106, 106);
            color: white;
            font-weight: bold;
            font-size: 13px;
            text-align: left; /* Align text to the left */
            padding-left: 10px; /* Add some spacing for better appearance */
        }
        .send-btn {
            display: block;
            width: 100%;
            background-color: green;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            border-top-left-radius: 10px; /* Matches table's rounded corners */
            border-top-right-radius: 10px; /* Matches table's rounded corners */
        }
        .send-btn:hover {
            background-color: black;
        }
        .sent {
            background-color: #0056b3;
            cursor: default;
        }
        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid black;
            background: white;
            padding: 20px;
            font-size: 18px;
            text-align: center;
        }
        .button {
            width: 100%; /* Stretches button */
            margin-top: 10px; /* Space between button and inputs */
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="form-container">
            <label>Nombre d'utilisateurs: <input type="number" id="userCount" min="1" max="10" value="7"></label>
            <label>Threshold: <input type="number" id="threshold" min="0" value="4"></label>
            <button onclick="drawTables()">Générer le Schéma</button>
        </div>
    </div>
    
    <div class="container" id="tableContainer"></div>

    <script type="module">
        import init,{ WShamirUser,PubKeyAdder } from "./pkg/wasm_interface.js"
        await init();
        window.WShamirUser = WShamirUser;
        window.PubKeyAdder = PubKeyAdder;
    </script>

    <script>
        let users_list = [];
        let wShamir_list = new Map();;
        let global_threshold =0;
        let global_count =0;

        function generate_shamir_users(){
            users_list.forEach (uname => {
                wShamir_list.set(uname,new WShamirUser(users_list,uname,global_threshold));
                wShamir_list.get(uname).generate_secret();
            })
        }

        function generateRandomUser(index) {
            const newname = 'User ' + (index + 1);
            users_list.push(newname);
            return newname;
        }

        let highestZIndex = 10; // Start from 10 to avoid conflicts with other elements

        function bringToFront(element) {
            highestZIndex++;  
            element.style.zIndex = highestZIndex;
        }

        // Ensure all tables have a default z-index
        function initializeTablesZIndex() {
            document.querySelectorAll('.table-wrapper').forEach((table, index) => {
                table.style.zIndex = 10 + index; // Avoid overlap issues
            });
        }

        document.addEventListener("DOMContentLoaded", initializeTablesZIndex);
        
        function generateTable(user, angle, radius, index) {
            let wrapper = document.createElement('div');
            wrapper.classList.add('table-wrapper');

            let x = 40 + radius * Math.cos(angle);
            let y = 40 + radius * Math.sin(angle);
            wrapper.style.top = y + '%';
            wrapper.style.left = x + '%';

            let button = document.createElement('button');
            button.classList.add('send-btn');
            button.textContent = 'Diffuser';
            button.onclick = function() { sendSharePart(user, button); };

            let table = document.createElement('table');
            table.innerHTML = `<tr><th style="width: 300px;">${user}</th></tr>`;

            let shareRow = document.createElement('tr');
            shareRow.classList.add('fixed-row');
            let shareCell = document.createElement('td');
            shareCell.colSpan = 1;
            shareCell.textContent = 'Partage secret :';
            shareCell.style.backgroundColor = "rgb(230, 175, 9)";
            shareCell.style.color = "black";
            shareCell.style.fontWeight = "bold";
            shareCell.style.fontSize = "13px";
            shareRow.appendChild(shareCell);
            table.appendChild(shareRow);

            let publicShareRow = document.createElement('tr');
            publicShareRow.classList.add('fixed-row');
            let publicShareCell = document.createElement('td');
            publicShareCell.colSpan = 1;
            publicShareCell.textContent = 'Partage publique :';
            publicShareCell.style.backgroundColor = "rgb(230, 145, 9)";
            publicShareCell.style.color = "black";
            publicShareCell.style.fontWeight = "bold";
            publicShareCell.style.textAlign = "left";
            publicShareCell.style.fontSize = "13px";
            publicShareRow.appendChild(publicShareCell);
            table.appendChild(publicShareRow);

            let resizer = document.createElement('div');
            resizer.classList.add('resizer');
            resizer.addEventListener('mousedown', startResize);

            wrapper.appendChild(button);
            wrapper.appendChild(table);
            wrapper.appendChild(resizer);
            wrapper.addEventListener('mousedown', dragStart);
            wrapper.addEventListener("mousedown", function() {
                        bringToFront(wrapper);
                    });
            return wrapper;
        }
       
        function drawTables() 
        {
            const container = document.getElementById("tableContainer");
            container.innerHTML = "";
            let userCount = parseInt(document.getElementById("userCount").value) || 3;
            let threshold = parseInt(document.getElementById("threshold").value) || 0;
            users_list = [];
            wShamir_list.clear();
            global_count = userCount;
            global_threshold = threshold;
            let radius = 35;            
            for (let i = 0; i < userCount; i++) {
                let angle = (i / userCount) * (2 * Math.PI);
                container.appendChild(generateTable(generateRandomUser(i), angle, radius, i));
            }
            generate_shamir_users();
        }

        function sendSharePart(sender, button) 
        {
            if (button.classList.contains('sent')) return;           
            let tables = document.querySelectorAll("table");
            tables.forEach(table => {
                    let receiver_name = table.rows[0].cells[0].innerHTML;
                    let share_part = wShamir_list.get(sender).get_secret_part_for_user(receiver_name); 
                    let receiver = wShamir_list.get(receiver_name);
                    receiver.update_share(sender,share_part);
                    let receiver_sec_share = receiver.get_share();
                    let receiver_pub_share = receiver.get_partial_pubkey();
                    let share_message =  `${sender} : <span style="color: blue;">${share_part}</span>`;
                    let row = document.createElement("tr");
                    let cell = document.createElement("td");
                    cell.innerHTML = share_message;
                    cell.style.fontSize ="13px";
                    row.appendChild(cell);
                    let shareRow = table.querySelector(".fixed-row");
                    table.insertBefore(row, shareRow);
                    shareRow.cells[0].textContent = 'Partage secret : '+receiver_sec_share;
                    shareRow.nextElementSibling.cells[0].textContent = 'Partage publique : '+receiver_pub_share;
            });
            button.classList.add('sent');
            button.textContent = 'Diffusé';
            checkAllSent();
        }


        function checkAllSent() 
        {
            let allButtons = document.querySelectorAll(".send-btn");
            let allSent = Array.from(allButtons).every(button => button.classList.contains('sent'));            
            if (allSent) {
                showFinalKey();
            }
        }

        function showFinalKey() 
        {
            let container = document.getElementById("tableContainer");

            let existingAuthorityTable = document.getElementById("authorityTable");
            if (existingAuthorityTable) {
                    existingAuthorityTable.remove();
                }

            let wrapper = document.createElement("div");
            wrapper.id = "authorityTable";
            wrapper.classList.add("table-wrapper");
            wrapper.style.position = "absolute";
            wrapper.style.top = `${window.innerHeight / 2 - 250}px`;
            wrapper.style.left = `${window.innerWidth / 2 - 300}px`; 
            wrapper.style.width = "730px"; 
            wrapper.style.border = "1px solid black";
            wrapper.style.overflow = "hidden";
            wrapper.style.cursor = "grab"; 
  
            let table = document.createElement("table");
            table.style.width = "100%";
            table.style.borderCollapse = "collapse";

            let headerRow = document.createElement("tr");
            let headerCell = document.createElement("th");
            headerCell.textContent = "Autorité de Publication ";
            headerCell.style.backgroundColor = "rgb(165, 19, 19)";
            headerCell.style.padding = "10px";
            headerCell.style.textAlign = "center";
            headerCell.style.color = "white";
            headerRow.appendChild(headerCell);
            table.appendChild(headerRow);
            table.style.zIndex=999;
            let adder = new PubKeyAdder();
            let tables = document.querySelectorAll(".table-wrapper table");
            tables.forEach(tbl => {
                let rows = tbl.querySelectorAll("tr"); 
                let firstRow = rows.length > 1 ? rows[0] : null; 
                let lastRow = rows.length > 2 ? rows[rows.length - 1] : null; 
                if (firstRow && lastRow) {
                    let newRow = document.createElement("tr");
                    let newCell = document.createElement("td");
                    let parts = lastRow.cells[0].innerHTML.split(" : ");
                    let pub = parts.slice(1).join(" : ");
                    newCell.innerHTML = "Part pub. "+firstRow.cells[0].innerHTML+": "+'<span style="color: blue;">'+pub+'</span>';
                    newCell.style.fontSize = "13px";
                    newCell.style.padding = "5px";
                    newRow.appendChild(newCell);
                    table.appendChild(newRow);
                    adder.add(pub);
                }
            });

            let fixedRow = document.createElement("tr");
            let fixedCell = document.createElement("td");
            fixedCell.style.fontSize = "18px";
            fixedCell.style.color = "black";
            fixedCell.style.fontWeight = "bold";
            fixedCell.style.textAlign = "left";
            fixedCell.style.padding = "4px";
            fixedCell.style.backgroundColor = "rgb(230, 145, 9)"; 
            fixedRow.appendChild(fixedCell);
            fixedRow.style.height="80px";

            // Create text node
            let textNode = document.createTextNode("Clé publique : "+ adder.get_pubkey() + " "); 

                    // Create Copy Button
            let button = document.createElement("button");
            button.textContent = "📋 Copier"; // Emoji for better UI
            button.style.marginLeft = "10px"; // Small spacing
            button.onclick = function () {
                        copyRowText(adder.get_pubkey());
                    };

            // Append text and button to cell
            fixedCell.appendChild(textNode);
            fixedCell.appendChild(button);

            table.appendChild(fixedRow);
            wrapper.appendChild(table);
            let resizer = document.createElement('div');
            resizer.classList.add('resizer');
            resizer.addEventListener('mousedown', startResize);
            wrapper.appendChild(resizer);
            wrapper.addEventListener('mousedown', dragStart);
            wrapper.addEventListener("mousedown", function() {
                        bringToFront(wrapper);
                    });
            container.appendChild(wrapper);
            bringToFront(wrapper);
        }

        function dragStart(event) 
        {
            let wrapper = event.currentTarget;
            let shiftX = event.clientX - wrapper.getBoundingClientRect().left;
            let shiftY = event.clientY - wrapper.getBoundingClientRect().top;            
            function moveAt(pageX, pageY) {
                wrapper.style.left = pageX - shiftX + 'px';
                wrapper.style.top = pageY - shiftY + 'px';
            }
            
            function onMouseMove(event) {
                moveAt(event.pageX, event.pageY);
            }
            
            document.addEventListener('mousemove', onMouseMove);            
            function stopDrag() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', stopDrag);
            }
            
            document.addEventListener('mouseup', stopDrag);
        }

        function startResize(event) {
            event.preventDefault();
            let resizer = event.target;
            let table = resizer.previousElementSibling; 
            let wrapper = table.parentElement;
            let startX = event.clientX; 
            let startWidth = table.getBoundingClientRect().width; 
            wrapper.removeEventListener('mousedown', dragStart);

                function onMouseMove(event) {
                let newWidth = event.clientX - table.getBoundingClientRect().left;
                table.style.width = newWidth + "px";
                wrapper.style.width = `${newWidth}px`;

                resizer.style.width = "5px";  
                resizer.style.right = "0";    
                }
                function stopResize() {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', stopResize);
                        wrapper.addEventListener('mousedown', dragStart);
                    }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', stopResize);
            }
        
        function copyRowText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied: " + text);
            }).catch(err => {
                console.error("Failed to copy text: ", err);
            });
        }
        document.addEventListener("DOMContentLoaded", function () {
    // Create button container
    let buttonContainer = document.createElement("div");
    buttonContainer.style.position = "fixed";
    buttonContainer.style.bottom = "20px";
    buttonContainer.style.right = "20px";
    buttonContainer.style.display = "flex";
    buttonContainer.style.gap = "10px"; // Space between buttons

    // Button styles
    function createStyledButton(text) {
        let button = document.createElement("button");
        button.textContent = text;
        button.style.padding = "10px 20px";
        button.style.cursor = "pointer";
        button.style.border = "none";
        button.style.outline = "none";
        button.style.borderRadius = "20px"; // Rounded corners
        button.style.backgroundColor = "#0056b3"; // Custom background color
        button.style.color = "white"; // White text
        button.style.fontWeight = "bold"; // Bold text
        button.style.fontSize = "14px";
        button.style.width = "150px"; // Same width
        button.style.height = "40px"; // Same height
        button.style.textAlign = "center";
        button.style.boxShadow = "2px 2px 5px rgba(0, 0, 0, 0.2)"; // Light shadow
        button.style.transition = "0.2s";

        // Hover effect
        button.addEventListener("mouseenter", function () {
            button.style.opacity = "0.8";
        });
        button.addEventListener("mouseleave", function () {
            button.style.opacity = "1";
        });

        return button;
    }

    // Create buttons
    let encryptButton = createStyledButton("Chiffrement");
    let reconstructButton = createStyledButton("Reconstruction");
    encryptButton.addEventListener("click", function(){window.location="./encryption.html"});
    // Append buttons to container
    buttonContainer.appendChild(encryptButton);
    buttonContainer.appendChild(reconstructButton);

    // Append container to body
    document.body.appendChild(buttonContainer);
});

    </script>
</body>
</html>
