<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f4f4, #d7e3fc);
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 95%; /* Enlarged the container */
            max-width: 1200px; /* Set a maximum width for larger screens */
            height: 95%; /* Enlarged the container */
            background: linear-gradient(135deg, #ffffff, #f4f4f4);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: linear-gradient(90deg, #007BFF, #0056b3);
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: white;
            transition: 0.3s;
        }
        .tab.active::after {
            width: 50%;
        }
        .tab:hover {
            background: linear-gradient(90deg, #0056b3, #003d80);
        }
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100%;
            width: 100%;
        }
        .page.active {
            display: flex;
            flex-direction: column;
        }
        .editor {
            width: 100%;
            height: calc(33% - 20px); /* Each editor takes ~33% of the page minus margins */
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px; /* Spacing between editors */
            overflow: auto;
            border-radius: 5px;
            background: white;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
            resize: none;
        }
        .editor[readonly] {
            background-color: #f9f9f9;
            cursor: not-allowed;
        }
        .input-group {
            display: flex;
            align-items: center; /* Vertically align items */
            width: 100%;
            margin-bottom: 20px; /* Consistent spacing between input groups */
        }
        label {
            flex: 0 0 100px; /* Fixed width for labels */
            text-align: right;
            margin-right: 10px; /* Horizontal spacing between label and input */
            font-weight: bold;
            line-height: 1.5; /* Ensure consistent vertical alignment */
        }
        input[type="text"] {
            flex: 1; /* Allow input fields to take up remaining space */
            padding: 10px; /* Internal padding for input fields */
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
            margin: 0; /* Remove any default margin */
        }
        button {
            padding: 10px 20px; /* Match button height with input fields */
            font-size: 16px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 10px; /* Horizontal spacing between input and button */
            margin-bottom: 0; /* Ensure no extra bottom margin */
        }
        button:hover {
            background: #0056b3;
        }
        button.clear-btn {
            background: #ff4d4d;
        }
        button.clear-btn:hover {
            background: #c40000;
        }

        /* PDF Display */
        .pdf-display {
            width: 100%;
            height: calc(50% - 40px); /* Half of the page minus margins */
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            cursor: pointer;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 5px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
        }
        .pdf-display iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Alert Container */
        .alert-container {
            position: fixed; /* Fix the alert at the center of the viewport */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            pointer-events: none; /* Ensure the alert doesn't block interactions */
            z-index: 1000; /* Ensure the alert appears above other elements */
        }
        .alert {
            margin: 0; /* Remove default margins */
            padding: 20px 40px; /* Add padding for better appearance */
            border-radius: 8px; /* Rounded corners */
            color: white;
            font-size: 18px; /* Larger font size for visibility */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
            pointer-events: auto; /* Allow interaction with the alert */
            display: none; /* Initially hidden */
        }
        .alert.success {
            background: #28a745; /* Success color */
        }
        .alert.error {
            background: #dc3545; /* Error color */
        }

        @media (max-width: 600px) {
            .container {
                max-width: 100%;
            }
            .editor, .pdf-display {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Alert Containers -->
    <div class="alert-container">
        <div class="alert success" id="text-success-alert">Action successful!</div>
        <div class="alert error" id="text-error-alert">Error: Invalid key or data.</div>
        <div class="alert success" id="pdf-success-alert">Action successful!</div>
        <div class="alert error" id="pdf-error-alert">Error: Invalid key or file.</div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchPage('text')">Chiffrement d'un Text</div>
            <div class="tab" onclick="switchPage('pdf')">Chiffrement d'un document PDF</div>
        </div>
        <div class="page active" id="text-page">
            <textarea class="editor" id="text-input" placeholder="Enter text to encrypt..."></textarea>
            <div class="input-group">
                <label for="text-encryption-key">Public Key:</label>
                <input type="text" id="text-encryption-key" placeholder="Encryption Key">
                <button onclick="encryptText()">Encrypt →</button>
            </div>
            <textarea class="editor" id="text-encrypted" readonly placeholder="Encrypted text will appear here..."></textarea>
            <div class="input-group">
                <label for="text-decryption-key">Secret Key:</label>
                <input type="text" id="text-decryption-key" placeholder="Decryption Key">
                <button onclick="decryptText()">← Decrypt</button>
                <button class="clear-btn" onclick="clearTextFields()">Clear</button>
            </div>
            <textarea class="editor" id="text-decrypted" readonly placeholder="Decrypted text will appear here..."></textarea>
        </div>
        <div class="page" id="pdf-page">
            <div class="input-group">
                <label for="pdf-encryption-key">Public Key:</label>
                <input type="text" id="pdf-encryption-key" placeholder="Encryption Key">
                <button onclick="encryptPDF()">Encrypt →</button>
            </div>
            <div class="pdf-display" id="pdf-upload" onclick="document.getElementById('pdf-input').click()">Click to load PDF</div>
            <input type="file" id="pdf-input" accept="application/pdf" style="display: none;" onchange="loadPDF(event)">
            <div class="input-group">
                <label for="pdf-decryption-key">Secret Key:</label>
                <input type="text" id="pdf-decryption-key" placeholder="Decryption Key">
                <button onclick="decryptPDF()">← Decrypt</button>
                <button class="clear-btn" onclick="clearPDFFields()">Clear</button>
            </div>
            <div class="pdf-display" id="pdf-decrypted">Decrypted PDF will appear here</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`${page}-page`).classList.add('active');
            document.querySelector(`.tab[onclick="switchPage('${page}')"]`).classList.add('active');
        }

        function loadPDF(event) {
            const file = event.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                document.getElementById('pdf-upload').innerHTML = `<iframe src="${fileURL}"></iframe>`;
            } else {
                document.getElementById('pdf-upload').innerHTML = 'No PDF selected';
            }
        }

        function encryptText() {
            const input = document.getElementById('text-input').value;
            const key = document.getElementById('text-encryption-key').value;
            try {
                const encrypted = CryptoJS.AES.encrypt(input, key).toString();
                document.getElementById('text-encrypted').value = encrypted;
                showTextAlert('success', 'Action successful!');
            } catch (error) {
                showTextAlert('error', 'Error: Invalid key or data.');
            }
        }

        function decryptText() {
            const encrypted = document.getElementById('text-encrypted').value;
            const key = document.getElementById('text-decryption-key').value;
            try {
                const decrypted = CryptoJS.AES.decrypt(encrypted, key).toString(CryptoJS.enc.Utf8);
                document.getElementById('text-decrypted').value = decrypted;
                showTextAlert('success', 'Action successful!');
            } catch (error) {
                showTextAlert('error', 'Error: Invalid key or data.');
            }
        }

        function clearTextFields() {
            document.getElementById('text-input').value = '';
            document.getElementById('text-encryption-key').value = '';
            document.getElementById('text-encrypted').value = '';
            document.getElementById('text-decryption-key').value = '';
            document.getElementById('text-decrypted').value = '';
            hideTextAlerts();
        }

        function clearPDFFields() {
            document.getElementById('pdf-encryption-key').value = '';
            document.getElementById('pdf-decryption-key').value = '';
            document.getElementById('pdf-upload').innerHTML = 'Click to load PDF';
            document.getElementById('pdf-decrypted').innerHTML = 'Decrypted PDF will appear here';
            hidePDFAlerts();
        }

        function showTextAlert(type, message) {
            const alert = document.getElementById(`text-${type}-alert`);
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => hideTextAlerts(), 3000);
        }

        function hideTextAlerts() {
            document.getElementById('text-success-alert').style.display = 'none';
            document.getElementById('text-error-alert').style.display = 'none';
        }

        function showPDFAlert(type, message) {
            const alert = document.getElementById(`pdf-${type}-alert`);
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => hidePDFAlerts(), 3000);
        }

        function hidePDFAlerts() {
            document.getElementById('pdf-success-alert').style.display = 'none';
            document.getElementById('pdf-error-alert').style.display = 'none';
        }

        function encryptPDF() {
            // Placeholder for PDF encryption logic
            showPDFAlert('success', 'PDF encrypted successfully!');
        }

        function decryptPDF() {
            // Placeholder for PDF decryption logic
            showPDFAlert('success', 'PDF decrypted successfully!');
        }
    </script>
</body>
</html>
