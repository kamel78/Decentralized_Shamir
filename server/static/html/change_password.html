<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
           margin: 0;
           min-height: 100vh;
           display: flex;
           justify-content: center; /* Center the form horizontally */
           align-items: center; /* Center the form vertically */
           background: white;
           position: relative;
       }
       body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(201, 196, 196); /* Adjust the color and opacity */
            z-index: 1; /* Ensures it appears above the background */
        }

        .content {
            position: relative;
            z-index: 2; /* Ensures content appears above the overlay */
        }
       .form-container {
           position: relative;
           z-index: 2; /* Place the form above the image */
           background: rgb(201, 196, 196);
           border-radius: 8px;
           box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
           max-width: 400px;
           width: 100%;
           text-align: left;
       }
   </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 absolute inset-0">
    <div class="form-container">
        <div class="bg-white shadow-2xl rounded-2xl overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800">Changer votre mot de passe</h2>
                    <p class="text-gray-600 mt-2">Veuillez remplir le formulaire pour changer votre mot de passe</p>
                </div>
                
                <!-- Formulaire de changement de mot de passe -->
                <form onsubmit="handlePasswordChange(event)">
                    <!-- Current Password -->
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="currentPassword">
                            <i class="fas fa-lock mr-2 text-gray-500"></i> Mot de passe actuel
                        </label>
                        <div class="relative w-full">
                            <input 
                                type="password" 
                                id="currentPassword" 
                                placeholder="Entrez votre mot de passe actuel"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-300 pr-12"
                                required
                            >
                            <button type="button" class="absolute inset-y-0 right-3 flex items-center justify-center h-full w-10 text-gray-500" onclick="togglePassword('currentPassword', 'eye-icon-current')">
                                <i id="eye-icon-current" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                
                    <!-- New Password -->
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="newPassword">
                            <i class="fas fa-lock mr-2 text-gray-500"></i> Nouveau mot de passe
                        </label>
                        <div class="relative w-full">
                            <input 
                                type="password" 
                                id="newPassword" 
                                placeholder="Entrez votre nouveau mot de passe"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-300 pr-12"
                                required
                            >
                            <button type="button" class="absolute inset-y-0 right-3 flex items-center justify-center h-full w-10 text-gray-500" onclick="togglePassword('newPassword', 'eye-icon-new')">
                                <i id="eye-icon-new" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                
                    <!-- Confirm New Password -->
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="confirmPassword">
                            <i class="fas fa-lock mr-2 text-gray-500"></i> Confirmer le nouveau mot de passe
                        </label>
                        <div class="relative w-full">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                placeholder="Confirmez votre nouveau mot de passe"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-300 pr-12"
                                required
                            >
                            <button type="button" class="absolute inset-y-0 right-3 flex items-center justify-center h-full w-10 text-gray-500" onclick="togglePassword('confirmPassword', 'eye-icon-confirm')">
                                <i id="eye-icon-confirm" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                
                    <!-- Password Hint Message -->
                    <div id="passwordHints" class="mt-6 text-sm hidden mb-5">
                        <p id="passwordHintMessage" class="text-red-500">Les mots de passe ne correspondent pas ou une erreur est survenue.</p>
                    </div>               
                    
                    <button 
                        type="submit" 
                        class="w-full bg-gradient-to-r from-purple-600 to-blue-500 text-white py-3 rounded-lg hover:from-purple-700 hover:to-blue-600 transition duration-300 transform hover:scale-105 ease-in-out"
                    >
                    Changer le mot de passe
                    </button>
                </form>
                
                <div class="text-center mt-6">
                    <p class="text-gray-600 text-sm">
                        <a href="dashboard" class="text-purple-600 hover:text-purple-800 font-bold">
                            Annuler
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
                    const passwordInput = document.getElementById(inputId);
                    const eyeIcon = document.getElementById(iconId);

                    if (passwordInput.type === "password") {
                        passwordInput.type = "text";
                        eyeIcon.classList.remove("fa-eye");
                        eyeIcon.classList.add("fa-eye-slash");
                    } else {
                        passwordInput.type = "password";
                        eyeIcon.classList.remove("fa-eye-slash");
                        eyeIcon.classList.add("fa-eye");
                    }
                }
        async function handlePasswordChange(event) {
            event.preventDefault();
            try {
                document.getElementById('passwordHints').classList.add('hidden');
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    throw new Error("Les mots de passe ne correspondent pas.");
                }

                const response = await fetch('/change-password', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                if (!response.ok) {
                    const errorMessage = await response.text();
                    throw new Error(errorMessage || 'Une erreur est survenue lors du changement du mot de passe.');
                }

                const data = await response.json();
                alert("Mot de passe changé avec succès !");
                window.location.href = "/dashboard";
            } catch (e) {
                console.error("Le changement de mot de passe a échoué:", e);
                document.getElementById('passwordHints').classList.remove('hidden');
                document.getElementById('passwordHintMessage').textContent = e.message || 'Une erreur est survenue.';
            }
        }
    </script>
</body>
</html>
