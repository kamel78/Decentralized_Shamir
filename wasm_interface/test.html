<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <style>
        body {  
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="password">Username:</label>
        <input type="text" id="username">
    </div>
    <button onclick="checkUser()">Check</button>
    <div id="result"></div>
    <ul id="usersList"></ul> 


    <script type="module">
        import init, { WShamirUser } from './pkg/wasm_interface.js';

        window.checkUser = async function() {
            await init();
            let usersList = ["User1", "User2", "User3", "User4", "User5"];
            let list = document.getElementById("usersList");
            let threshold = 3
            const username = document.getElementById('username').value;
            try {
                    let user_instance = new WShamirUser(usersList,username,threshold);
                    user_instance.generate_secret();
                    let share = user_instance.get_share();
                    document.getElementById('result').innerHTML = `User: ${share}`;
                    usersList.forEach(user => {
                                            let li = document.createElement("li"); 
                                            let sec_user = user_instance.get_secret_part_for_user(user);
                                            li.textContent = user + " : "+ sec_user;
                                            list.appendChild(li); 
                                            });
            } catch (e) {
                document.getElementById('result').innerHTML = `Error: ${e}`;
            }
        }

    </script>
</body>
</html>
